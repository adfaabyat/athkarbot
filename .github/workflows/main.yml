name: Post Adkar Every 30 Minutes

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Upgraded to v4

      - name: Set up Python
        uses: actions/setup-python@v5  # Upgraded to v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyTelegramBotAPI google-generativeai

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
